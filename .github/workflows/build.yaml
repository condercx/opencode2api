name: Build

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, windows]
        goarch: [amd64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
          check-latest: true

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -o "opencode2api-${{ matrix.goos }}-${{ matrix.goarch }}${ext}" .
          echo "Built opencode2api-${{ matrix.goos }}-${{ matrix.goarch }}${ext}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: opencode2api-${{ matrix.goos }}-${{ matrix.goarch }}
          path: opencode2api-${{ matrix.goos }}-${{ matrix.goarch }}*
